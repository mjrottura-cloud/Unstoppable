<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE FREAK PROTOCOL — 92 Days</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800;900&family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1215; --panel:#171c21; --panel2:#1d242b; --line:#2a3138;
  --text:#e8e4dc; --dim:#9aa3ac; --faint:#6b7580;
  --ember:#e0862b; --ember-dk:#a35d15;
  --teal:#3fa7bd; --green:#4caf7d; --red:#d64545; --gold:#c9a84c;
  --mono:'IBM Plex Mono',monospace; --disp:'Barlow Condensed',sans-serif; --body:'Barlow',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.55;padding-bottom:90px}
::selection{background:var(--ember);color:#0f1215}

header{padding:26px 18px 14px;border-bottom:1px solid var(--line);position:relative;overflow:hidden}
header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
  background:linear-gradient(90deg,var(--ember) var(--prog,0%),var(--line) var(--prog,0%))}
.brand{font-family:var(--disp);font-weight:900;font-size:34px;letter-spacing:.03em;line-height:1}
.brand em{font-style:normal;color:var(--ember)}
.tagline{color:var(--dim);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;margin-top:4px}

nav{display:flex;gap:2px;position:sticky;top:0;background:var(--bg);z-index:50;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{flex:1;min-width:86px;background:none;border:none;color:var(--dim);font-family:var(--disp);font-weight:800;font-size:15px;letter-spacing:.08em;padding:13px 8px 11px;cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase}
nav button.active{color:var(--text);border-bottom-color:var(--ember)}
nav button:focus-visible{outline:2px solid var(--ember);outline-offset:-2px}

main{max-width:820px;margin:0 auto;padding:18px}
section.tab{display:none}
section.tab.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){section.tab.active{animation:none}}

.daycount{font-family:var(--disp);font-weight:900;font-size:76px;line-height:.9;letter-spacing:.01em}
.daycount span{font-size:30px;color:var(--faint);font-weight:800}
.phasechip{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;padding:4px 10px;border:1px solid var(--ember);color:var(--ember);border-radius:3px;text-transform:uppercase;margin-top:8px}
.datebar{display:flex;align-items:center;gap:10px;margin:14px 0 4px;flex-wrap:wrap}
.datebar .dt{font-family:var(--mono);font-size:13px;color:var(--dim)}
.datebar button{background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 12px;border-radius:4px;cursor:pointer}
.datebar button:hover{border-color:var(--ember)}
.datebar button:focus-visible{outline:2px solid var(--ember)}

.quote{border-left:3px solid var(--gold);padding:12px 16px;margin:18px 0;background:var(--panel);border-radius:0 6px 6px 0}
.quote p{font-size:16.5px;font-weight:500;font-style:italic;color:var(--text)}
.quote cite{display:block;margin-top:6px;font-style:normal;font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}

.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:14px 0;overflow:hidden}
.card>.chead{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.card>.chead h3{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:.04em;text-transform:uppercase}
.card>.chead .sub{font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:.05em}
.card .cbody{padding:8px 16px 14px}
.tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;padding:2px 8px;border-radius:3px;text-transform:uppercase}
.tag.swim{background:rgba(63,167,189,.15);color:var(--teal)}
.tag.lift{background:rgba(224,134,43,.15);color:var(--ember)}
.tag.rehab{background:rgba(76,175,125,.15);color:var(--green)}
.tag.lax{background:rgba(201,168,76,.16);color:var(--gold)}
.tag.rec{background:rgba(154,163,172,.15);color:var(--dim)}
.tag.test{background:rgba(214,69,69,.15);color:var(--red)}

.exrow{display:grid;grid-template-columns:1fr auto;gap:4px 14px;padding:9px 0;border-bottom:1px dashed var(--line);align-items:start}
.exrow:last-child{border-bottom:none}
.exrow .nm{font-weight:600;font-size:14.5px}
.exrow .nm small{display:block;font-weight:400;color:var(--dim);font-size:12.5px;margin-top:2px;line-height:1.45}
.exrow .dose{font-family:var(--mono);font-size:13px;color:var(--ember);white-space:nowrap;text-align:right;padding-top:2px}
.exrow.done .nm,.exrow.done .dose{opacity:.38;text-decoration:line-through}
.exrow label{display:flex;gap:10px;cursor:pointer;align-items:start}
.exrow input{margin-top:4px;accent-color:var(--ember);width:15px;height:15px;flex:none}
.blockh{font-family:var(--disp);font-weight:800;font-size:15px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin:14px 0 2px}
.blockh:first-child{margin-top:6px}
.why{background:var(--panel2);border-radius:6px;padding:10px 14px;margin-top:12px;font-size:13.5px;color:var(--dim)}
.why b{color:var(--text)}

.ph{border:1px solid var(--line);border-radius:8px;margin:14px 0;overflow:hidden}
.ph summary{padding:14px 16px;cursor:pointer;list-style:none;display:flex;gap:12px;align-items:baseline;background:var(--panel)}
.ph summary::-webkit-details-marker{display:none}
.ph summary .n{font-family:var(--disp);font-weight:900;font-size:22px;color:var(--ember)}
.ph summary h3{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:.04em;text-transform:uppercase}
.ph summary .rng{font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-left:auto}
.ph .pbody{padding:4px 16px 16px;border-top:1px solid var(--line)}
.wk{margin:10px 0;border-left:2px solid var(--line);padding-left:12px}
.wk h4{font-family:var(--disp);font-size:16px;font-weight:800;letter-spacing:.06em;color:var(--gold);text-transform:uppercase}
.wk p{font-size:13.5px;color:var(--dim)}

table{width:100%;border-collapse:collapse;font-size:13.5px;margin:10px 0}
th{font-family:var(--disp);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:13px;text-align:left;color:var(--dim);padding:8px 10px;border-bottom:2px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
td.mono{font-family:var(--mono);font-size:12.5px;color:var(--ember);white-space:nowrap}
tr:last-child td{border-bottom:none}

.alert{border:1px solid var(--red);background:rgba(214,69,69,.08);border-radius:8px;padding:12px 16px;margin:14px 0}
.alert h4{color:var(--red);font-family:var(--disp);font-size:17px;letter-spacing:.06em;text-transform:uppercase}
.pass{border:1px solid var(--green);background:rgba(76,175,125,.07);border-radius:8px;padding:12px 16px;margin:14px 0}
.pass h4{color:var(--green);font-family:var(--disp);font-size:17px;letter-spacing:.06em;text-transform:uppercase}
ul.tick{list-style:none;margin-top:6px}
ul.tick li{padding:4px 0 4px 22px;position:relative;font-size:13.5px}
ul.tick li::before{content:"\25A1";position:absolute;left:2px;color:var(--dim)}
h2.sec{font-family:var(--disp);font-weight:900;font-size:26px;letter-spacing:.04em;text-transform:uppercase;margin:22px 0 4px}
h2.sec em{font-style:normal;color:var(--ember)}
p.lede{color:var(--dim);font-size:14px;margin-bottom:8px}
.foot{color:var(--faint);font-size:12px;font-family:var(--mono);text-align:center;margin-top:34px;letter-spacing:.06em}
a{color:var(--teal)}
</style>
</head>
<body>

<header id="hdr">
  <div class="brand">THE <em>FREAK</em> PROTOCOL</div>
  <div class="tagline">92 days · rebuilt, reloaded, unreasonable · Jul 16 — Oct 15, 2026</div>
</header>

<nav id="nav" role="tablist">
  <button class="active" data-tab="today">Today</button>
  <button data-tab="program">Program</button>
  <button data-tab="testing">Testing</button>
  <button data-tab="failsafes">Fail-Safes</button>
  <button data-tab="playbook">Playbook</button>
</nav>

<main>
<section class="tab active" id="tab-today"></section>
<section class="tab" id="tab-program"></section>
<section class="tab" id="tab-testing"></section>
<section class="tab" id="tab-failsafes"></section>
<section class="tab" id="tab-playbook"></section>
</main>

<script>
/* ============================================================
   THE FREAK PROTOCOL — data + engine
   Progress checkboxes are in-memory only (reset on refresh).
   To persist, wire the checkbox handler to your own storage.
   ============================================================ */

const START = new Date(2026,6,16);           // Jul 16
const END   = new Date(2026,9,15);           // Oct 15
const DAY   = 86400000;
const fmt = d => d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
const dayNum = d => Math.floor((stripT(d)-stripT(START))/DAY)+1;   // 1..92
function stripT(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}

const PHASES=[
 {n:1,name:"THE REBUILD",start:new Date(2026,6,16),end:new Date(2026,7,14),
  goal:"Ankle + shoulder reconstructed, physique built, swim engine installed. Rehab gates govern all lower-body and explosive decisions.",
  color:"var(--ember)"},
 {n:2,name:"ITALY — THE ROAD BLOCK",start:new Date(2026,7,15),end:new Date(2026,7,26),
  goal:"Run-based VO2 development + maintenance strength with zero equipment guaranteed. Arrive back sharper aerobically than you left.",
  color:"var(--teal)"},
 {n:3,name:"THE RELOAD",start:new Date(2026,7,27),end:new Date(2026,8,9),
  goal:"Back at Brown, full gym: explosive strength, sprint speed, snatches, plyometrics. The freak-of-nature block.",
  color:"var(--gold)"},
 {n:4,name:"SEASON MODE",start:new Date(2026,8,10),end:new Date(2026,9,15),
  goal:"Lacrosse leads. Two lifts + one VO2 top-up per week keep everything you built while practice sharpens it.",
  color:"var(--green)"}
];
function phaseOf(d){d=stripT(d);for(const p of PHASES){if(d>=stripT(p.start)&&d<=stripT(p.end))return p;}return null;}
function weekInPhase(d,p){return Math.floor((stripT(d)-stripT(p.start))/DAY/7)+1;}

/* ---------- shared blocks ---------- */
const SHOULDER_MIN={h:"SHOULDER DAILY MINIMUM (4 min — before everything)",tag:"rehab",rows:[
 ["Band pull-aparts","2\u00d715","Palms down, 1s squeeze"],
 ["Band external rotation, elbow at side","2\u00d715/side","Towel pinned at elbow. Slow."],
 ["Scap push-ups","1\u00d712","Arms locked; only the blades move"]]};
const SHOULDER_FULL={h:"SHOULDER FULL BLOCK (~15 min, done warm)",tag:"rehab",rows:[
 ["Side-lying DB external rotation","3\u00d712\u201315/side","2.5\u20135 lb. THE cuff builder. Strict."],
 ["Band internal rotation","2\u00d715/side","Subscapularis"],
 ["Prone Y-T-W","2\u00d78 each","Thumbs up, 1s hold. DBs from Wk 4"],
 ["Face pulls","3\u00d715","Pull to eyebrows, knuckles rotate up"],
 ["Serratus wall slides","2\u00d710","Reach at the top"],
 ["Isometric biceps hold @90\u00b0","3\u00d730s","Light DB. \u22642/10. Tendon dose."],
 ["Cross-body + sleeper stretch","2\u00d730s each","Gentle"]]};
const CUFF_FIN={h:"CUFF FINISHER (3 min)",tag:"rehab",rows:[
 ["Face pulls","3\u00d715",""],["Band external rotation","2\u00d715/side",""]]};
const ANKLE=(w)=>({h:"ANKLE BLOCK (per rehab protocol — Week "+w+")",tag:"rehab",rows:[
 ["Run the Week "+w+" ankle block from the rehab PDF","~15\u201320 min","Band 4-way \u00b7 balance ladder \u00b7 heel-raise progression \u00b7 pain \u22643/10 \u00b7 morning-after rule"]]});
const ANKLE_MAINT={h:"ANKLE INSURANCE (2\u00d7/week forever)",tag:"rehab",rows:[
 ["Band eversion, heavy + slow","3\u00d712/side","The peroneals catch the ankle before the ligament loads"],
 ["Single-leg balance, eyes closed / unstable","3\u00d730s","Proprioception decays without practice"],
 ["Single-leg heel raises","3\u00d715","Calf capacity = ankle armor"]]};
const WALLBALL=(min,note)=>({h:"LACROSSE — EVERY DAY",tag:"lax",rows:[
 ["Wall ball",min+" min",note||"Both hands, quick sticks, fakes. The stick never takes a day off."]]});

/* ---------- PHASE 1 sessions (weekday 0=Sun..6=Sat) ---------- */
function p1(dow,w){
 const wkA=(a)=>a[Math.min(w,4)-1];
 switch(dow){
  case 4: return {title:"SWIM — VO2 INTERVALS",tags:["swim","rehab"],blocks:[
    SHOULDER_MIN,
    {h:"MAIN SET (300m WU / 200m CD around it)",tag:"swim",rows:[
     ["VO2 set",wkA(["8\u00d7100m @RPE8 · :30 rest","10\u00d7100m @RPE8\u20139 · :25","12\u00d7100m @RPE9 · :20","6\u00d7100m @RPE9 + 8\u00d750m max · :20"]),"All reps within 3s of each other. No flip turns / hard push-offs until Wk 3."]]},
    SHOULDER_FULL,ANKLE(w),WALLBALL(15)],
    why:"VO2 leads the week while you're freshest. Shoulder block lands post-swim — warm tissue takes cuff work best, and fatigue can't wreck stroke mechanics mid-set."};
  case 5: return {title:"PULL + HIPS",tags:["lift","rehab"],blocks:[
    SHOULDER_MIN,
    {h:"A — PULL (rest 2\u20133 min mains)",tag:"lift",rows:[
     ["Pull-ups — overhand/neutral ONLY","5\u00d7max\u22122","1\u20132 RIR always. Vest Wk 3\u20134 only if shoulder silent 2 wks."],
     ["1-arm DB row, neutral grip","4\u00d78\u201310/side","Heavy. Elbow to hip."],
     ["Inverted rows / cable row (neutral)","3\u00d712\u201315","1s squeeze; elevate feet to progress"],
     ["Rear-delt flyes, chest supported","3\u00d715","Light + strict — the from-behind look"],
     ["DB shrugs","3\u00d712 · 2s hold","No rolling"]]},
    {h:"B — HIPS (ankle-neutral legs)",tag:"lift",rows:[
     ["Hip thrust","4\u00d710\u201312","Heavy by Wk 2. Engine + centerpiece."],
     ["Nordic / sliding leg curls","4\u00d76\u20138","Cuts hamstring injury risk ~50% (van der Horst 2015)"],
     ["Copenhagen plank","3\u00d720\u201330s/side","Groin injuries \u221241% (Har\u00f8y 2019)"],
     ["Side-lying abduction / banded clam","3\u00d715/side","Glute med = clean landings"],
     [w>=3?"DB RDL + goblet squat (gates passed)":"— standing loaded legs locked until Wk 3 gates —",w>=3?"3\u00d710 each":"","First standing load. Perfect form, moderate weight."]]},
    CUFF_FIN,ANKLE(w),WALLBALL(15)],
    why:"Pulling lands the day AFTER swimming so the shoulder never stacks both stimuli. All rows neutral/overhand, elbow-driven — back grows, biceps tendon stays out of the line of fire."};
  case 6: return {title:"SWIM — PEAK SESSION",tags:["swim"],blocks:[
    SHOULDER_MIN,
    {h:"MAIN SET — hardest of the week",tag:"swim",rows:[
     ["Peak set",wkA(["5\u00d7200m @RPE8 · :45","6\u00d7200m @RPE8\u20139 · :40","Pyramid 100\u2013400\u2013100 @RPE9 · :45","8\u00d7200m @RPE9 · :30 — all within 3s"]),"Highest-carb day. Fuel it."]]},
    ANKLE(w),WALLBALL(15)],
    why:"One clearly hardest session per week is how the engine actually moves — everything else supports it."};
  case 0: return {title:"RECOVERY — THE ADAPTATION WINDOW",tags:["rec","rehab"],blocks:[
    {h:"ENGINEERED, NOT PASSIVE",tag:"rec",rows:[
     ["Easy swim flush","600\u2013900m @RPE4\u20135","Circulation, not stimulus. Do not race it."],
     ["Full mobility","20\u201325 min","Hips, T-spine, calves, rear capsule"],
     ["Log the week","5 min","Pull-up reps, swim times, pain scores, morning HR"]]},
    SHOULDER_FULL,
    {h:"ANKLE — LIGHT ONLY",tag:"rehab",rows:[["Balance play + gentle band","~8 min","Stand on the left leg while brushing teeth"]]},
    WALLBALL(10,"Easy hands only")],
    why:"Lowest-carb day. Sleep is tonight's workout — the week ahead is earned here."};
  case 1: return {title:"PUSH + CORE",tags:["lift","rehab"],blocks:[
    SHOULDER_MIN,
    {h:"A — PUSH",tag:"lift",rows:[
     ["Incline DB press","4\u00d78\u201310","Your staple. Full ROM, no bounce."],
     ["Flat DB press","3\u00d78\u201310","Slight elbow tuck — kinder to the front of the shoulder"],
     ["Weighted / archer push-ups","3\u00d712\u201315","Volume finisher"],
     [w>=2?"Dips — shallow, assess":"Dips — SKIP Wk 1",w>=2?"3\u00d78\u201312":"","Stop on any front-shoulder pinch"],
     [w>=3?"DB lateral raises":"Lateral raises unlock Wk 3 (shoulder ladder)",w>=3?"3\u00d712\u201315":"","The side-delt cap. Strict, stop at shoulder height."],
     [w>=3?"Seated DB OHP, neutral grip":"Overhead press unlocks Wk 3 if silent",w>=3?"3\u00d78\u201310":"","First overhead load — earn it"]]},
    {h:"B — CORE (visible abs + shot velocity)",tag:"lift",rows:[
     ["Hanging knee/leg raises","4\u00d710\u201315","Lying raises if shoulder cranky"],
     ["Hollow body hold","4\u00d730\u201345s",""],
     ["Pallof press","3\u00d712/side","Anti-rotation stiffness = shot speed"],
     ["Side plank + reach-through","3\u00d730\u201345s/side",""],
     ["Ab-wheel rollouts (knees)","3\u00d78\u201312",""]]},
    CUFF_FIN,ANKLE(w),WALLBALL(20,"Some reps on the left leg only (Wk 2+)")],
    why:"Delts, chest, abs — the front of the jersey. Every press variation chosen for what it gives divided by what it costs the biceps tendon."};
  case 2: return {title:"SWIM — THRESHOLD / LONG",tags:["swim","rehab"],blocks:[
    SHOULDER_MIN,
    {h:"MAIN SET",tag:"swim",rows:[
     ["Engine room",wkA(["1,200m continuous @RPE6\u20137","1,600m continuous @RPE7","4\u00d7400m @RPE8 · :45","MILE TIME TRIAL — 1,600m all-out. Record it."]),w===4?"The benchmark. Empty the tank.":"Steady, controlled, boring on purpose"]]},
    SHOULDER_FULL,ANKLE(w),
    {h:"STICK",tag:"lax",rows:[["Stationary shooting","15\u201320 min","Low-leg day = skill day"]]}],
    why:"Threshold volume is what makes the Thursday intervals survivable and the Saturday peak repeatable."};
  case 3: return {title:"ARMS + DENSITY — GATE TEST DAY",tags:["lift","test"],blocks:[
    {h:"FIRST: ANKLE GATE TESTS — completely fresh",tag:"test",rows:[
     ["Run this week's gate from the rehab protocol","Pass = advance","Fail = repeat the week. Gates > dates."]]},
    SHOULDER_MIN,
    {h:"A — ARMS (tendon-safe)",tag:"lift",rows:[
     ["Close-grip push-ups / DB skull crushers","3\u00d710\u201315","Triceps are 2/3 of the arm"],
     ["Overhead DB triceps extension","3\u00d712","Long head"],
     [w>=3?"Hammer curls (unlocked)":"Hammer curls unlock Wk 3 if isometrics silent 2 wks",w>=3?"2\u20133\u00d712 light":"","Neutral grip: brachialis grows, tendon spared. 3s eccentric Wk 4."],
     ["Band pressdowns","2\u00d720","Pump finisher"]]},
    {h:"B — DENSITY CIRCUIT ("+wkA(["3 rounds","4 rounds","5 rounds","5 rounds · rest 60s"])+")",tag:"lift",rows:[
     ["Push-ups \u00d720 \u2192 inverted rows \u00d712 \u2192 hollow rocks \u00d720","",""],
     ["Hip thrusts \u00d720 \u2192 pull-ups \u00d76 (1\u20132 RIR) \u2192 plank taps \u00d720","",""],
     ["Dips \u00d710 (if cleared) \u2192 slow mountain climbers \u00d730 \u2192 rest 90s","","Heart rate, not failure. Zero impact."]]},
    CUFF_FIN,WALLBALL(15)],
    why:"Gate tests come first and fresh — they decide next week. The circuit is the leanness session: calisthenics as cardio, exactly the tool it's always been in your program."};
 }
}

/* ---------- PHASE 2: ITALY — repeating 4-day microcycle ---------- */
function p2(d){
 const idx=Math.floor((stripT(d)-stripT(PHASES[1].start))/DAY); // 0..11
 const cyc=idx%4, rd=Math.floor(idx/4)+1; // round 1..3
 const vo2=["4\u00d73min @90% HRmax · 3min jog rest","4\u00d74min @90\u201395% HRmax · 3min jog (Helgerud protocol)","5\u00d74min @90\u201395% HRmax · 3min jog — or 16\u00d730s/30s @ ~vVO2"][rd-1];
 const base={tags:["rec"],blocks:[]};
 if(cyc===0) return {title:"RUN — VO2 (Round "+rd+"/3)",tags:["swim"],blocks:[
   {h:"THE SESSION",tag:"swim",rows:[
    ["Warm-up jog + drills","12 min","A-skips, high knees, 4\u00d715s strides"],
    ["Intervals",vo2,"The single best-evidenced VO2max protocol (Helgerud 2007). Hard but repeatable."],
    ["Cool-down","8 min easy",""]]},
   {h:"AFTER",tag:"lift",rows:[["Push-up ladder 1\u21929\u21921 + bench/step dips \u00d73\u00d715","~10 min","Any piazza bench works"]]},
   SHOULDER_MIN,
   {h:"ANKLE (travel version)",tag:"rehab",rows:[["Single-leg balance eyes closed 3\u00d730s + SL heel raises 3\u00d715","5 min","No band needed. Every VO2 day."]]},
   WALLBALL(15,"The stick flies in the suitcase. Any wall in Italy is a wall.")],
   why:"Cobblestones and 20k steps/day are free Zone 2 — the intervals are the only thing you must manufacture. Three hard runs a round is the whole aerobic job."};
 if(cyc===1) return {title:"ZONE 2 + MOBILITY",tags:["rec"],blocks:[
   {h:"AEROBIC BASE",tag:"swim",rows:[["Easy run 40\u201350 min @ conversational pace — or a 90+ min hike/walk day","Z2","Nose-breathable. This is where the engine's floor rises."]]},
   {h:"MOBILITY",tag:"rec",rows:[["Full session: hips, calves, T-spine, rear capsule","20 min",""]]},
   SHOULDER_MIN,WALLBALL(15)],
   why:"High-volume low-intensity days between interval days is exactly how endurance athletes periodize — Italy hands you this for free."};
 if(cyc===2) return {title:"BODYWEIGHT STRENGTH (Round "+rd+"/3)",tags:["lift"],blocks:[
   SHOULDER_MIN,
   {h:"FIND A BAR (playground, scaffolding, sturdy branch)",tag:"lift",rows:[

function getSession(d){
 const p=phaseOf(d); if(!p) return null;
 let w=weekInPhase(d,p); const dow=d.getDay();
 if(p.n===1){w=Math.min(w,4); return {...p1(dow,w),phase:p,week:w};}
 if(p.n===2) return {...p2(d),phase:p,week:w};
 if(p.n===3) return {...p3(dow,w,d),phase:p,week:w};
 return {...p4(dow,w),phase:p,week:w};
}

function renderBlocks(blocks){

 }).join('');
}

function renderFailsafes(){
 $('tab-failsafes').innerHTML=`
 <h2 class="sec">FAIL-<em>SAFES</em></h2>
 <p class="lede">Every weekly target has a pre-decided correction. Missing a number never means "try harder" — it means run the specific fix. Decided now, so no negotiating with yourself later.</p>
 <table>
 <tr><th>If this happens\u2026</th><th>\u2026the fix is</th></tr>
 <tr><td><b>Missed a session</b></td><td>Never miss two. Swap, don't skip: the week's hardest session survives, the accessory session dies. A missed lift folds its 2 main lifts into the next session as 2 sets each.</td></tr>
 <tr><td><b>Swim/run interval times slipping across the week</b></td><td>It's almost never fitness. Audit in order: sleep hours \u2192 carbs on hard days \u2192 pacing rep 1 (you're starting too hot). Fix the first broken one. Still slipping after a week: add one easy Z2 session, subtract nothing.</td></tr>
 <tr><td><b>Pull-ups stalled 2 weeks</b></td><td>Check RIR honesty first (film a set — bar speed doesn't lie). Then: add one back-off set of 50% reps, +20g protein/day, and verify sleep. Progress resumes within 10 days or drop 2 total sets for a week (overreached, not underworked).</td></tr>
 <tr><td><b>Morning resting HR +7bpm for 3 days</b></td><td>Under-recovered. That day's session drops one hard set per block; next Sunday becomes fully off. HR normal = resume. This one is not optional — it's the earliest overtraining alarm you own.</td></tr>
 <tr><td><b>Sleep average under 8h for a week</b></td><td>Cut the LAST hard set of every session until fixed (tired training is stolen training). Fix: fixed wake time 7 days, screens off 60 min before bed, room cold + black. Sleep is a training variable, not a lifestyle preference — under 8h \u2248 1.7\u00d7 injury risk (Milewski 2014).</td></tr>
 <tr><td><b>Weight dropping >1%/week during deficit weeks</b></td><td>You're burning muscle, not just fat. +150 kcal (carbs, on hard days) and reassess in 7 days.</td></tr>
 <tr><td><b>Weight flat + waist flat for 2 weeks (Wk 3+)</b></td><td>\u2212150 kcal from rest-day carbs only. Hard-day fueling is untouchable.</td></tr>
 <tr><td><b>Shoulder: pain during pulling</b></td><td>End pulling that day. Next session: 50% pull volume. Clears = rebuild over a week. Doesn't clear, or ANY night pain 3+ nights = message PT, hold all pulling progression.</td></tr>
 <tr><td><b>Ankle: swelling, giving-way, or pain >3/10</b></td><td>Rehab protocol rules override everything. Back one level, morning-after rule decides. New bruising or a rolling episode = PT same day.</td></tr>
 <tr><td><b>Italy: no pull-up bar found</b></td><td>Towel rows on a railing/door + doorframe iso rows + wide push-up volume \u00d71.5. Back width holds for 12 days easily. Search: parks (calisthenics bars are everywhere in Italian parks), playgrounds, scaffolding.</td></tr>
 <tr><td><b>Italy: schedule chaos, session windows vanish</b></td><td>The irreducible day: 20 min run with 6\u00d71 min hard + push-up ladder + wall ball. 30 minutes total. Zero-day count for the trip must stay \u22643.</td></tr>
 <tr><td><b>Back at Brown: DOMS wrecking week 1 of Reload</b></td><td>Planned. Loads start at 80% of pre-trip; if soreness compromises sprint quality, sprint day slides 24h. Speed work only happens fresh.</td></tr>
 <tr><td><b>Season: practice + lifts burying you</b></td><td>Drop the VO2 top-up first, Lift B second, Lift A never. One heavy full-body session/week maintains strength for months in-season.</td></tr>
 <tr><td><b>Motivation gone</b></td><td>Motivation was never the plan. The plan is the plan. Do the first 10 minutes; the day always follows. Read today's quote again. Then start.</td></tr>
 </table>
 <div class="alert"><h4>Hard stops — no fail-safe applies, PT/doctor same day</h4>
 <ul class="tick"><li>Ankle: new bruising, giving-way episode, swelling persisting past 24h</li>
 <li>Shoulder: night pain 3+ consecutive nights, or pulling pain that survives a 50% volume cut</li>
 <li>Anything sharp, sudden, or with a pop — anywhere</li></ul></div>`;
}
